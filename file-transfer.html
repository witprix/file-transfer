<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robust Batch Transfer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; display: flex; justify-content: center; }
        .card { background: white; padding: 24px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .progress-bar { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin: 15px 0; }
        #bar { height: 100%; background: #28a745; width: 0%; transition: width 0.1s; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3 id="status">Ready to Pair</h3>
    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
    <button onclick="document.getElementById('folderInput').click()">Select Folder</button>
    <button id="sendBtn" style="background:#28a745">Start Transfer</button>
    <div class="progress-bar"><div id="bar"></div></div>
    <p id="stats"></p>
</div>

<script>
    let conn, peer = new Peer();
    let fileQueue = [];
    const MAX_BUFFER = 1024 * 1024 * 4; // 4MB Buffer limit to prevent crashes

    peer.on('open', id => document.getElementById('status').innerText = "Connected ID: " + id);
    peer.on('connection', c => { conn = c; setupConnection(); });

    function setupConnection() {
        conn.on('data', (data) => {
            // ACKNOWLEDGMENT: Only proceed if the receiver confirms receipt
            if (data === 'ACK') window.readyForNextChunk = true;
        });
    }

    document.getElementById('folderInput').onchange = e => fileQueue = Array.from(e.target.files);

    document.getElementById('sendBtn').onclick = async () => {
        if (!conn) return alert("No peer connected!");
        const startTime = Date.now();
        
        for (const file of fileQueue) {
            // Signal: Start a new file
            conn.send({ type: 'start', name: file.webkitRelativePath, size: file.size });
            await streamFile(file);
        }
        
        document.getElementById('stats').innerText = `Batch Complete in ${((Date.now() - startTime)/1000).toFixed(2)}s`;
    };

    async function streamFile(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            let offset = 0;
            const CHUNK = 65536; // 64KB

            const process = () => {
                // BACKPRESSURE: Stop if buffer is full
                if (conn.dataChannel.bufferedAmount > MAX_BUFFER) {
                    setTimeout(process, 10);
                    return;
                }

                reader.onload = e => {
                    conn.send({ type: 'data', chunk: e.target.result });
                    offset += e.target.result.byteLength;
                    document.getElementById('bar').style.width = `${(offset/file.size)*100}%`;

                    if (offset < file.size) {
                        reader.readAsArrayBuffer(file.slice(offset, offset + CHUNK));
                    } else {
                        conn.send({ type: 'end' });
                        resolve();
                    }
                };
                reader.readAsArrayBuffer(file.slice(offset, offset + CHUNK));
            };
            process();
        });
    }
</script>
</body>
</html>
