<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P WiFi Transfer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #peer-id { font-weight: bold; color: #007bff; background: #e7f3ff; padding: 5px; border-radius: 4px; }
        .status { font-size: 0.85rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>WiFi File Share</h2>
    <p>Your ID: <span id="peer-id">Connecting...</span></p>
    
    <hr>
    
    <input type="text" id="remoteId" placeholder="Enter Friend's ID">
    <input type="file" id="fileInput">
    <button id="sendBtn">Send File</button>

    <div id="status" class="status">Waiting for connection...</div>
</div>

<script>
    const peer = new Peer(); // Create a random ID
    let conn;

    // Display your ID
    peer.on('open', (id) => {
        document.getElementById('peer-id').innerText = id;
    });

    // --- SENDER LOGIC ---
    document.getElementById('sendBtn').onclick = () => {
        const remoteId = document.getElementById('remoteId').value;
        const file = document.getElementById('fileInput').files[0];
        
        if (!remoteId || !file) return alert("Enter ID and select a file!");

        document.getElementById('status').innerText = "Connecting...";
        conn = peer.connect(remoteId);

        conn.on('open', () => {
            document.getElementById('status').innerText = "Sending " + file.name + "...";
            conn.send({
                file: file,
                fileName: file.name,
                fileType: file.type
            });
        });
    };

    // --- RECEIVER LOGIC ---
    peer.on('connection', (connection) => {
        conn = connection;
        document.getElementById('status').innerText = "Incoming transfer...";

        conn.on('data', (data) => {
            document.getElementById('status').innerText = "Received: " + data.fileName;
            
            // Convert received data to a downloadable link
            const blob = new Blob([data.file], { type: data.fileType });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = data.fileName;
            a.click();
        });
    });

    peer.on('error', (err) => {
        console.error(err);
        alert("Connection Error: " + err.type);
    });
</script>

</body>
</html>
