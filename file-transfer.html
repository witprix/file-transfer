<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi File Transfer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 400px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
        input[type="file"] { margin: 20px 0; }
        #status { margin-top: 20px; color: #555; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="card">
    <h2>WiFi Share</h2>
    <p>Ensure both phones are on the same WiFi.</p>
    
    <input type="file" id="fileInput">
    <button id="sendBtn">Send File</button>
    
    <div id="status">Ready...</div>
    <div id="progress"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    // WebRTC Peer Connection
    let localConnection;
    let sendChannel;

    sendBtn.onclick = () => {
        const file = fileInput.files[0];
        if (!file) return alert("Select a file first!");

        status.innerText = "Initializing connection...";
        
        // Setup WebRTC
        localConnection = new RTCPeerConnection();
        sendChannel = localConnection.createDataChannel("fileTransfer");
        
        sendChannel.onopen = () => {
            status.innerText = "Sending: " + file.name;
            sendFile(file);
        };

        // In a real app, you would exchange 'SDP Offers' here via a signaling server
        console.log("Offer created. Connect the second phone to this peer ID.");
    };

    function sendFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            sendChannel.send(e.target.result);
            status.innerText = "Transfer Complete!";
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
