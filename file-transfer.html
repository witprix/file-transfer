<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent WiFi Transfer</title>
    
    <!-- External Dependencies -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f8f9fa; --secondary: #6c757d; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        #qrcode { margin: 20px auto; padding: 15px; border: 1px solid #eee; border-radius: 12px; display: inline-block; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin: 10px 0; background: #000; }
        
        /* Modernized Progress & Metrics Dashboard */
        .progress-container { width: 100%; background: #e9ecef; border-radius: 10px; margin: 15px 0 5px 0; height: 12px; display: none; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: var(--success); transition: width 0.1s linear; }
        .metrics-box { display: none; text-align: left; background: #f1f3f5; padding: 12px; border-radius: 10px; margin: 10px 0; font-size: 0.85rem; color: #495057; }
        .metrics-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .metrics-row:last-child { margin-bottom: 0; }
        .metrics-val { font-weight: 600; color: #212529; }

        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; display: none; }
        .btn-success { background: var(--success); color: white; display: none; }
        .btn-secondary { background: var(--secondary); color: white; margin: 0; }
        
        .btn-group { display: flex; gap: 10px; margin: 15px 0; }
        #selectionText { font-size: 0.9rem; color: #555; word-break: break-all; margin-bottom: 15px; font-weight: 500; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; background: #eee; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="statusBadge" class="status-badge">Connecting to Network...</div>
    
    <div id="setupView">
        <div id="qrcode"></div>
        <p style="color: #666; font-size: 0.9rem;">Scan to connect phones</p>
        <button class="btn-primary" onclick="startScanner()">Scan QR Code</button>
    </div>

    <div id="scanView" class="hidden">
        <div id="reader"></div>
        <button class="btn-secondary" onclick="stopScanner()">Cancel</button>
    </div>

    <div id="transferView" class="hidden">
        <p id="peerInfo" style="font-weight: bold; margin-bottom: 5px;"></p>
        
        <input type="file" id="fileInput" multiple class="hidden">
        <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden">
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">📄 Select File(s)</button>
            <button class="btn-secondary" onclick="document.getElementById('folderInput').click()">📁 Select Folder</button>
        </div>
        
        <p id="selectionText">No item selected</p>
        
        <button class="btn-success" id="sendBtn" style="display:block">Start Transfer</button>
        
        <!-- Dashboard Display Components -->
        <div class="progress-container" id="pContainer"><div id="progressBar"></div></div>
        
        <div class="metrics-box" id="metricsBox">
            <div class="metrics-row"><span>Items:</span><span class="metrics-val" id="mFiles">0 / 0</span></div>
            <div class="metrics-row"><span>Data Size:</span><span class="metrics-val" id="mData">0 MB / 0 MB</span></div>
            <div class="metrics-row"><span>Speed:</span><span class="metrics-val" id="mSpeed">0 MB/s</span></div>
            <div class="metrics-row"><span>Time Left:</span><span class="metrics-val" id="mTime">--:--</span></div>
        </div>

        <button class="btn-danger" id="disconnectBtn" style="display:block">Disconnect Session</button>
    </div>
</div>

<script>
    const CHUNK_SIZE = 16384 * 4; // 64KB
    let peer, conn, wakeLock = null;
    let heartbeatInterval;
    
    let pendingTransfer = [];
    let isZippedTransfer = false;
    let totalFilesCount = 0;
    
    const html5QrCode = new Html5Qrcode("reader");

    peer = new Peer({
        config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]},
        debug: 1
    });

    peer.on('open', (id) => {
        updateStatus("Ready: Share QR");
        new QRCode(document.getElementById("qrcode"), { text: id, width: 180, height: 180 });
    });

    peer.on('connection', (incoming) => {
        if (conn) conn.close(); 
        conn = incoming;
        setupConnection();
    });

    function setupConnection() {
        conn.on('open', () => {
            updateStatus("Connected & Secured", "var(--success)", "white");
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('scanView').classList.add('hidden');
            document.getElementById('transferView').classList.remove('hidden');
            startHeartbeat();
        });

        conn.on('data', handleData);
        
        conn.on('close', () => {
            alert("Peer disconnected");
            location.reload();
        });
    }

    function startHeartbeat() {
        heartbeatInterval = setInterval(() => {
            if (conn && conn.open) conn.send({ type: 'ping' });
        }, 5000);
    }

    async function startScanner() {
        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('scanView').classList.remove('hidden');
        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    stopScanner();
                    updateStatus("Connecting...");
                    conn = peer.connect(decodedText, { reliable: true });
                    setupConnection();
                },
                (errorMessage) => {}
            );
        } catch (err) {
            alert("Camera error: " + err);
            stopScanner();
        }
    }

    async function stopScanner() {
        if (html5QrCode.isScanning) await html5QrCode.stop();
        document.getElementById('scanView').classList.add('hidden');
        document.getElementById('setupView').classList.remove('hidden');
    }

    // Input Parsing UI updates
    document.getElementById('fileInput').onchange = (e) => {
        if(!e.target.files.length) return;
        pendingTransfer = Array.from(e.target.files);
        totalFilesCount = pendingTransfer.length;
        if (totalFilesCount > 1) {
            isZippedTransfer = true;
            document.getElementById('selectionText').innerText = `Selected ${totalFilesCount} files (Will be packed)`;
        } else {
            isZippedTransfer = false;
            document.getElementById('selectionText').innerText = "Selected File: " + pendingTransfer[0].name;
        }
    };

    document.getElementById('folderInput').onchange = (e) => {
        if(!e.target.files.length) return;
        pendingTransfer = Array.from(e.target.files);
        totalFilesCount = pendingTransfer.length;
        isZippedTransfer = true;
        const folderName = pendingTransfer[0].webkitRelativePath.split('/')[0] || "Selected_Folder";
        document.getElementById('selectionText').innerText = `Selected Folder: ${folderName} (${totalFilesCount} files)`;
    };

    // Helper to format values elegantly
    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Sender Pipeline
    document.getElementById('sendBtn').onclick = async () => {
        if (pendingTransfer.length === 0) return alert("Please select a file or folder first.");
        if (window.activeFile) return alert("A transfer is already in progress.");

        showDashboard(true);
        let fileToSend;
        let fileName;

        if (isZippedTransfer) {
            updateStatus("Compressing...", "var(--primary)", "white");
            document.getElementById('mTime').innerText = "Packing entries...";
            const zip = new JSZip();
            const isFolderStructure = pendingTransfer[0].webkitRelativePath && pendingTransfer[0].webkitRelativePath.includes('/');
            const baseName = isFolderStructure ? pendingTransfer[0].webkitRelativePath.split('/')[0] : "Shared_Files";
            
            for(let i=0; i < pendingTransfer.length; i++) {
                const f = pendingTransfer[i];
                const filePath = (isFolderStructure && f.webkitRelativePath) ? f.webkitRelativePath : f.name;
                zip.file(filePath, f);
            }
            
            fileToSend = await zip.generateAsync({type:"blob"}, (meta) => {
                updateProgress(meta.percent, 100);
                document.getElementById('mFiles').innerText = `${Math.round(meta.percent)}% Packaged`;
            });
            fileName = baseName + ".zip";
        } else {
            fileToSend = pendingTransfer[0];
            fileName = fileToSend.name;
        }

        updateStatus("Sending...", "var(--primary)", "white");
        conn.send({ 
            type: 'metadata', 
            name: fileName, 
            size: fileToSend.size, 
            mime: fileToSend.type || "application/zip",
            itemCount: totalFilesCount 
        });

        let offset = 0;
        let startTime = Date.now();
        const reader = new FileReader();

        reader.onload = (e) => {
            conn.send({ type: 'chunk', chunk: e.target.result });
            offset += e.target.result.byteLength;
            
            // Calculate Performance Metrics dynamically
            const elapsed = (Date.now() - startTime) / 1000; // seconds
            const speed = elapsed > 0 ? (offset / elapsed) : 0; // bytes per sec
            const remainingBytes = fileToSend.size - offset;
            const timeLeft = speed > 0 ? Math.ceil(remainingBytes / speed) : 0;
            
            // Format time display (MM:SS)
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            const timeString = speed > 0 ? `${min}:${sec < 10 ? '0' : ''}${sec} left` : '--:--';

            // Send analytical status metadata package to syncing receiver
            conn.send({
                type: 'metrics',
                done: offset,
                total: fileToSend.size,
                speed: speed,
                timeStr: timeString,
                count: totalFilesCount
            });

            // Update Sender Local UI
            updateProgress(offset, fileToSend.size);
            document.getElementById('mFiles').innerText = isZippedTransfer ? `${totalFilesCount} Files Packed` : `1 File`;
            document.getElementById('mData').innerText = `${formatBytes(offset)} / ${formatBytes(fileToSend.size)}`;
            document.getElementById('mSpeed').innerText = `${formatBytes(speed)}/s`;
            document.getElementById('mTime').innerText = timeString;

            if (offset < fileToSend.size) {
                readNext();
            } else {
                updateStatus("Transfer Complete", "var(--success)", "white");
                document.getElementById('mTime').innerText = "Finished";
                pendingTransfer = [];
                document.getElementById('selectionText').innerText = "No item selected";
                document.getElementById('fileInput').value = "";
                document.getElementById('folderInput').value = "";
            }
        };

        const readNext = () => reader.readAsArrayBuffer(fileToSend.slice(offset, offset + CHUNK_SIZE));
        readNext();
    };

    // Receiver Real-time Sync Engine
    function handleData(data) {
        if (data.type === 'ping') return;
        
        if (data.type === 'metadata') {
            window.activeFile = { name: data.name, size: data.size, type: data.mime, chunks: [], received: 0, count: data.itemCount };
            showDashboard(true);
            updateStatus("Receiving...");
        } else if (data.type === 'chunk') {
            window.activeFile.chunks.push(data.chunk);
            window.activeFile.received += data.chunk.byteLength;
            if (window.activeFile.received >= window.activeFile.size) finalizeFile();
        } else if (data.type === 'metrics') {
            // Update receiver interface mirroring calculations
            updateProgress(data.done, data.total);
            document.getElementById('mFiles').innerText = data.count > 1 ? `Extracts ${data.count} Files` : `1 File`;
            document.getElementById('mData').innerText = `${formatBytes(data.done)} / ${formatBytes(data.total)}`;
            document.getElementById('mSpeed').innerText = `${formatBytes(data.speed)}/s`;
            document.getElementById('mTime').innerText = data.timeStr;
        }
    }

    function finalizeFile() {
        const blob = new Blob(window.activeFile.chunks, { type: window.activeFile.type });
        const downloadUrl = URL.createObjectURL(blob);
        const fileName = window.activeFile.name;
        
        // Dynamic generation to safely bypass cross-browser permission locks
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        updateStatus("Transfer Received!", "var(--success)", "white");
        document.getElementById('mTime').innerText = "Saved";
        
        const oldBtn = document.getElementById('manualDownloadBtn');
        if (oldBtn) oldBtn.remove();

        const transferView = document.getElementById('transferView');
        const fallbackBtn = document.createElement('button');
        fallbackBtn.id = 'manualDownloadBtn';
        fallbackBtn.className = "btn-success";
        fallbackBtn.style.display = "block";
        fallbackBtn.style.marginTop = "15px";
        fallbackBtn.innerText = `💾 Save ${fileName}`;
        fallbackBtn.onclick = () => {
            const manualLink = document.createElement('a');
            manualLink.href = downloadUrl;
            manualLink.download = fileName;
            document.body.appendChild(manualLink);
            manualLink.click();
            document.body.removeChild(manualLink);
        };
        
        const disconnectBtn = document.getElementById('disconnectBtn');
        transferView.insertBefore(fallbackBtn, disconnectBtn);
        window.activeFile = null;
    }

    function showDashboard(visible) {
        const state = visible ? 'block' : 'none';
        document.getElementById('pContainer').style.display = state;
        document.getElementById('metricsBox').style.display = state;
    }

    function updateStatus(text, bg = "#eee", color = "#333") {
        const b = document.getElementById('statusBadge');
        b.innerText = text; b.style.background = bg; b.style.color = color;
    }

    function updateProgress(done, total) {
        document.getElementById('progressBar').style.width = (done / total * 100) + "%";
    }

    document.getElementById('disconnectBtn').onclick = () => {
        if (confirm("Disconnect session?")) {
            if (conn) conn.close();
            location.reload();
        }
    };
</script>
</body>
</html>
